<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Content Pool')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/content}">Content</a> &raquo;
        <span>Content Pool</span>
    </div>
    <h1>Content Pool</h1>
    <p>Content not assigned to any Point of Interest.</p>
    <a th:href="@{/web/content}" class="btn">All Content</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${contents}">
                <td th:text="${c.id}">1</td>
                <td th:text="${c.getClass().getSimpleName()}">TextContent</td>
                <td th:text="${#strings.listJoin(c.description.values(), ', ')}">Description</td>
                <td><a th:href="@{/web/content/{id}(id=${c.id})}" class="btn btn-sm">View</a></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${contents.isEmpty()}">All content items are assigned to POIs.</p>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
