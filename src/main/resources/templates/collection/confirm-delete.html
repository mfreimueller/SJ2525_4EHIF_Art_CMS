<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Delete Collection')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/collections}">Collections</a> &raquo;
        <a th:href="@{/web/collections/{id}(id=${collection.id.id()})}" th:text="${collection.id.id()}">123</a> &raquo;
        <span>Delete</span>
    </div>
    <h1>Delete Collection</h1>
    <p>Are you sure you want to delete this collection?</p>
    <table>
        <tr><th>ID</th><td th:text="${collection.id.id()}">1</td></tr>
        <tr>
            <th>Title</th>
            <td th:text="${#strings.listJoin(collection.title.values(), ', ')}">Title</td>
        </tr>
    </table>
    <form th:action="@{/web/collections/{id}/delete(id=${collection.id.id()})}" method="post" style="margin-top:1rem">
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a th:href="@{/web/collections/{id}(id=${collection.id.id()})}" class="btn">Cancel</a>
    </form>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
