<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Delete Creator')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/creators}">Creators</a> &raquo;
        <a th:href="@{/web/creators/{id}(id=${creator.id.id()})}" th:text="${creator.username}">admin</a> &raquo;
        <span>Delete</span>
    </div>
    <h1>Delete Creator</h1>
    <p>Are you sure you want to delete this creator?</p>
    <table>
        <tr><th>ID</th><td th:text="${creator.id.id()}">1</td></tr>
        <tr><th>Username</th><td th:text="${creator.username}">admin</td></tr>
        <tr><th>Role</th><td th:text="${creator.role}">ADMIN</td></tr>
    </table>
    <form th:action="@{/web/creators/{id}/delete(id=${creator.id.id()})}" method="post" style="margin-top:1rem">
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a th:href="@{/web/creators/{id}(id=${creator.id.id()})}" class="btn">Cancel</a>
    </form>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
