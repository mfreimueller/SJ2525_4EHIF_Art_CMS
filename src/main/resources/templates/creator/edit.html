<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Creator')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/creators}">Creators</a> &raquo;
        <a th:href="@{/web/creators/{id}(id=${creator.id.id()})}" th:text="${creator.username}">admin</a> &raquo;
        <span>Edit</span>
    </div>
    <h1>Edit Creator</h1>
    <form th:action="@{/web/creators/{id}/edit(id=${creator.id.id()})}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" th:value="${creator.username}" required minlength="3">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Leave blank to keep current" minlength="3">
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="VIEWER" th:selected="${creator.role.name() == 'VIEWER'}">VIEWER</option>
                <option value="EDITOR" th:selected="${creator.role.name() == 'EDITOR'}">EDITOR</option>
                <option value="ADMIN" th:selected="${creator.role.name() == 'ADMIN'}">ADMIN</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/web/creators/{id}(id=${creator.id.id()})}" class="btn">Cancel</a>
    </form>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
