<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Creators')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <h1>Creators</h1>
    <a th:href="@{/web/creators/create}" class="btn btn-success">Create Creator</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${creators}">
                <td th:text="${c.id.id()}">1</td>
                <td th:text="${c.username}">admin</td>
                <td th:text="${c.role}">ADMIN</td>
                <td class="actions">
                    <a th:href="@{/web/creators/{id}(id=${c.id.id()})}" class="btn btn-sm">View</a>
                    <a th:href="@{/web/creators/{id}/edit(id=${c.id.id()})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/web/creators/{id}/delete(id=${c.id.id()})}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
