<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Art CMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-form { max-width: 400px; margin: 2rem auto; padding: 2rem; border: 1px solid #ddd; border-radius: 5px; }
        .login-form h2 { margin-top: 0; }
        .login-form .form-group { margin-bottom: 1rem; }
        .login-form label { display: block; font-weight: bold; margin-bottom: 0.25rem; }
        .login-form input { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 3px; box-sizing: border-box; }
        .login-form .btn { width: 100%; padding: 0.5rem; }
        .register-link { text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-form">
        <h2>Login</h2>
        <div th:if="${param.error}" class="flash flash-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="flash flash-success">You have been logged out.</div>
        <div th:if="${registered != null}" class="flash flash-success" th:text="${registered}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-success">Login</button>
        </form>
        <div class="register-link">
            <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
        </div>
    </div>
</body>
</html>
