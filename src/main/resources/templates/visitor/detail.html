<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Visitor Detail')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/visitors}">Visitors</a> &raquo;
        <span th:text="${visitor.username}">visitor</span>
    </div>
    <h1 th:text="${visitor.username}">visitor</h1>
    <table>
        <tr><th>ID</th><td th:text="${visitor.id.id()}">1</td></tr>
        <tr><th>Username</th><td th:text="${visitor.username}">visitor</td></tr>
        <tr><th>Email</th><td th:text="${visitor.emailAddress}">visitor@example.com</td></tr>
    </table>
    <h2>Visit History (<span th:text="${visitor.visitHistories.size()}">0</span>)</h2>
    <table th:if="${!visitor.visitHistories.isEmpty()}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Visited On</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="vh : ${visitor.visitHistories}">
                <td th:text="${vh.id.id()}">1</td>
                <td th:text="${vh.visitedOn}">2024-01-01</td>
                <td th:text="${vh.duration}">120</td>
                <td><a th:href="@{/web/visit-histories/{id}(id=${vh.id.id()})}" class="btn btn-sm">View</a></td>
            </tr>
        </tbody>
    </table>
    <p th:if="${visitor.visitHistories.isEmpty()}">No visit history.</p>
    <div class="actions" style="margin-top:1rem">
        <a th:href="@{/web/visitors}" class="btn">Back to List</a>
    </div>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
