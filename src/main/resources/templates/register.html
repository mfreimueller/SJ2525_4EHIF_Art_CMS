<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Art CMS</title>
    <style>
        .register-form { max-width: 400px; margin: 2rem auto; padding: 2rem; border: 1px solid #ddd; border-radius: 5px; }
        .register-form h2 { margin-top: 0; }
        .register-form .form-group { margin-bottom: 1rem; }
        .register-form label { display: block; font-weight: bold; margin-bottom: 0.25rem; }
        .register-form input, .register-form select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 3px; box-sizing: border-box; }
        .register-form .btn { width: 100%; padding: 0.5rem; }
        .login-link { text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="register-form">
        <h2>Register</h2>
        <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required minlength="3">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="3">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-success">Register</button>
        </form>
        <div class="login-link">
            <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
        </div>
    </div>
</body>
</html>
