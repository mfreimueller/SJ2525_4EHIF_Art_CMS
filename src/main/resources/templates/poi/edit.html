<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit POI')}">
</head>
<body>
<header th:replace="~{layout :: header}"></header>
<nav th:replace="~{layout :: nav}"></nav>
<main>
    <div class="breadcrumb">
        <a th:href="@{/web/pois}">POIs</a> &raquo;
        <a th:href="@{/web/pois/{id}(id=${poi.id.id()})}" th:text="${poi.id.id()}">123</a> &raquo;
        <span>Edit</span>
    </div>
    <h1>Edit Point of Interest</h1>
    <form th:action="@{/web/pois/{id}/edit(id=${poi.id.id()})}" method="post">
        <div class="form-group">
            <label for="titleEn">Title (English)</label>
            <input type="text" id="titleEn" name="titleEn" th:value="${poi.title.get('en')}">
        </div>
        <div class="form-group">
            <label for="titleDe">Title (German)</label>
            <input type="text" id="titleDe" name="titleDe" th:value="${poi.title.get('de')}">
        </div>
        <div class="form-group">
            <label for="descEn">Description (English)</label>
            <textarea id="descEn" name="descEn" rows="3" th:text="${poi.description.get('en')}"></textarea>
        </div>
        <div class="form-group">
            <label for="descDe">Description (German)</label>
            <textarea id="descDe" name="descDe" rows="3" th:text="${poi.description.get('de')}"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/web/pois/{id}(id=${poi.id.id()})}" class="btn">Cancel</a>
    </form>
</main>
<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
